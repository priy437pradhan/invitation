<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Good night, Priya 🌙</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; overflow:hidden; }
  body {
    font-family:'Baloo 2','Segoe UI',system-ui,sans-serif;
    position:fixed; width:100%;
    background:linear-gradient(180deg,#101832 0%,#1b2547 48%,#2c3a63 80%,#3b4a78 100%);
    -webkit-user-select:none; user-select:none;
  }

  .star { position:absolute; background:#e8ecff; border-radius:50%; z-index:1;
          animation:twinkle 2.6s ease-in-out infinite; }
  @keyframes twinkle { 0%,100%{opacity:.2; transform:scale(.8);} 50%{opacity:.95; transform:scale(1.2);} }
  body.bright .star { animation-duration:1.1s; }

  #moon {
    position:absolute; top:6%; right:10%; z-index:2;
    width:72px; height:72px; border-radius:50%;
    background:radial-gradient(circle at 40% 36%,#fdf7de,#f4e2a4 75%);
    box-shadow:0 0 46px 16px rgba(244,226,164,.35);
    animation:moonfloat 7s ease-in-out infinite;
  }
  #moon:before, #moon:after {
    content:''; position:absolute; border-radius:50%;
    background:rgba(190,170,110,.35);
  }
  #moon:before { width:14px; height:14px; top:20px; left:16px; }
  #moon:after  { width:9px;  height:9px;  top:42px; left:38px; }
  @keyframes moonfloat { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-9px);} }

  .sheep {
    position:absolute; z-index:3; font-size:30px;
    animation:sheephop 7s linear 1 forwards; opacity:0; pointer-events:none;
  }
  @keyframes sheephop {
    0%   { transform:translateX(-60px) translateY(0); opacity:0; }
    5%   { opacity:1; }
    25%  { transform:translateX(25vw) translateY(-26px); }
    50%  { transform:translateX(50vw) translateY(0); }
    75%  { transform:translateX(75vw) translateY(-26px); }
    95%  { opacity:1; }
    100% { transform:translateX(105vw) translateY(0); opacity:0; }
  }

  .ground {
    position:absolute; bottom:0; left:0; right:0; height:15%; z-index:5;
    background:linear-gradient(180deg,#232f56 0%,#1a2340 100%);
    border-radius:50% 50% 0 0 / 26px 26px 0 0;
  }

  .title {
    position:absolute; top:7%; left:0; right:0; text-align:center; z-index:7;
    color:#dfe6ff; padding:0 24px; text-shadow:0 3px 14px rgba(5,10,30,.7);
  }
  .title h1 { font-size:clamp(25px,7vw,36px); font-weight:800; }
  .title p  { font-size:15px; opacity:.8; font-weight:500; margin-top:2px; }

  /* ---------- line cat (pale strokes on night) ---------- */
  #petBox {
    position:absolute; bottom:10.5%; left:0; width:165px; z-index:10;
    transform:translateX(-180px);
    transition:transform 3.2s cubic-bezier(.45,.05,.45,1);
    will-change:transform;
  }
  #petInner { width:100%; transform-origin:50% 94%; }
  #pet { width:100%; display:block; overflow:visible; filter:drop-shadow(0 8px 10px rgba(0,5,20,.5)); }

  .breath { animation:breath 3.4s ease-in-out infinite; transform-origin:105px 150px; }
  @keyframes breath { 0%,100%{transform:scale(1,1);} 50%{transform:scale(1.02,.985);} }
  .tail { transform-box:fill-box; transform-origin:10% 85%; animation:tailsway 3s ease-in-out infinite; }
  @keyframes tailsway { 0%,100%{transform:rotate(0);} 50%{transform:rotate(-12deg);} }
  .eyesOpen { transform-box:fill-box; transform-origin:center; animation:blink 5s infinite; }
  @keyframes blink { 0%,92%,100%{transform:scaleY(1);} 95%{transform:scaleY(.08);} }
  .eyesClosed, .yawnMouth { display:none; }
  .smileMouth { display:block; }
  #pet.sleepy .eyesOpen { display:none; }
  #pet.sleepy .eyesClosed { display:block; }
  #pet.yawning .yawnMouth { display:block; transform-box:fill-box; transform-origin:center top;
                            animation:yawn 1.6s ease-in-out infinite; }
  #pet.yawning .smileMouth { display:none; }
  @keyframes yawn { 0%,100%{transform:scaleY(.4);} 45%,60%{transform:scaleY(1);} }
  #pet.blushing .blush { opacity:.6; }
  .zzz { opacity:0; font-weight:800; font-family:'Baloo 2',sans-serif; }
  #pet.sleepy .zzz { animation:zfloat 2.4s ease-in-out infinite; }
  @keyframes zfloat {
    0%{opacity:0; transform:translateY(6px);} 30%{opacity:1;}
    100%{opacity:0; transform:translateY(-16px);}
  }

  .walking  { animation:walkbob .55s ease-in-out infinite; }
  @keyframes walkbob { 0%,100%{transform:translateY(0) rotate(-2deg);} 50%{transform:translateY(-8px) rotate(2deg);} }
  .dreamy   { animation:dreamy 2.6s ease-in-out infinite; }
  @keyframes dreamy { 0%,100%{transform:rotate(-2deg);} 50%{transform:rotate(2deg) translateY(-5px);} }
  .lovefall { animation:lovefall 1s ease-in 1 forwards; }
  @keyframes lovefall {
    0%{transform:rotate(0);} 40%{transform:rotate(-10deg) translateY(-14px);}
    70%{transform:rotate(80deg) translateY(4px);} 82%{transform:rotate(74deg);}
    100%{transform:rotate(78deg) translateY(8px);}
  }
  .happyjump{ animation:hjump .55s ease-in-out infinite; }
  @keyframes hjump {
    0%,100%{transform:translateY(0) scale(1,1);} 30%{transform:translateY(0) scale(1.08,.9);}
    60%{transform:translateY(-30px) scale(.94,1.08) rotate(4deg);}
  }

  /* caught star */
  #caughtStar {
    position:absolute; z-index:9; font-size:34px; left:50%; top:-10%;
    transform:translateX(-50%); opacity:0; pointer-events:none;
    transition:top 1.6s cubic-bezier(.4,.1,.5,1), opacity .5s ease;
    filter:drop-shadow(0 0 12px rgba(255,235,150,.9));
  }
  #caughtStar.fall { top:72%; opacity:1; }

  /* flying kiss */
  #kiss {
    position:fixed; z-index:50; font-size:34px; opacity:0; pointer-events:none;
    transition:left 1.3s cubic-bezier(.4,.1,.4,1), top 1.3s cubic-bezier(.4,.1,.4,1), opacity .3s ease;
  }

  /* ---------- bubble / hint / buttons / fall / finale ---------- */
  #bubble {
    position:absolute; z-index:20; left:50%; bottom:44%;
    transform:translateX(-50%) scale(0); transform-origin:50% 100%;
    max-width:78vw; background:#fffdf7; color:#33415c;
    border-radius:20px; padding:13px 17px;
    font-size:17px; font-weight:700; line-height:1.35; text-align:center;
    box-shadow:0 10px 26px rgba(0,5,25,.55);
    transition:transform .4s cubic-bezier(.34,1.56,.64,1);
  }
  #bubble.show { transform:translateX(-50%) scale(1); }
  #bubble:after {
    content:''; position:absolute; bottom:-11px; left:50%; margin-left:-11px;
    border-left:11px solid transparent; border-right:11px solid transparent;
    border-top:13px solid #fffdf7;
  }
  #hint {
    position:absolute; bottom:4%; left:0; right:0; text-align:center; z-index:7;
    color:#c9d4f5; opacity:.7; font-size:13px; font-weight:600;
    animation:hintpulse 1.6s ease-in-out infinite;
  }
  @keyframes hintpulse { 0%,100%{opacity:.3;} 50%{opacity:.8;} }

  #btns {
    position:absolute; bottom:5%; left:0; right:0; z-index:30;
    display:none; flex-direction:column; gap:12px; align-items:center; padding:0 30px;
  }
  #btns.show { display:flex; }
  .btn {
    width:100%; max-width:320px; border:none; border-radius:50px;
    font-family:inherit; font-size:18px; font-weight:800; padding:15px 20px;
    cursor:pointer; box-shadow:0 8px 20px rgba(0,5,25,.55);
    transition:transform .12s ease;
  }
  .btn:active { transform:scale(.95); }
  #btnKiss { background:linear-gradient(135deg,#b8a6ff,#7d6bf0); color:#1c1250; }
  #btnNoK  { background:rgba(255,255,255,.12); color:#c9d4f5; border:2px solid rgba(201,212,245,.4);
             font-size:15px; padding:12px 20px; max-width:260px;
             transition:transform .5s ease, opacity .5s ease; }
  #btnNoK.snoring { transform:rotate(8deg) scale(.9); opacity:.5; }

  .fall {
    position:absolute; top:-60px; z-index:8; font-size:28px;
    animation:falldown linear 1 forwards; pointer-events:none;
  }
  @keyframes falldown {
    0%{transform:translateY(0) rotate(0);opacity:1;} 90%{opacity:1;}
    100%{transform:translateY(110vh) rotate(340deg);opacity:0;}
  }

  #finale {
    position:absolute; inset:0; z-index:60; display:none;
    align-items:center; justify-content:center; padding:26px;
    background:rgba(5,10,30,.55); backdrop-filter:blur(3px);
  }
  #finale.show { display:flex; }
  .card {
    background:#fffdf7; border-radius:26px; padding:30px 24px; text-align:center;
    max-width:340px; width:100%; color:#33415c;
    box-shadow:0 20px 50px rgba(0,5,20,.6);
    animation:cardpop .5s cubic-bezier(.34,1.56,.64,1) 1;
  }
  @keyframes cardpop { 0%{transform:scale(.6);opacity:0;} 100%{transform:scale(1);opacity:1;} }
  .card .big { font-size:52px; line-height:1; }
  .card h2 { font-size:23px; font-weight:800; margin:10px 0 6px; color:#7d6bf0; }
  .card p  { font-size:16px; font-weight:600; line-height:1.45; }
  .card small { display:block; margin-top:14px; font-size:13px; opacity:.6; font-weight:600; }
  .replay { margin-top:18px; background:#b8a6ff; border:none; border-radius:40px;
            font-family:inherit; font-weight:800; font-size:15px; padding:11px 26px;
            color:#1c1250; cursor:pointer; box-shadow:0 6px 14px rgba(28,18,80,.4); }
</style>
</head>
<body>

  <div id="moon"></div>
  <div id="skyStars"></div>
  <div class="ground"></div>
  <div id="caughtStar">🌟</div>
  <div id="kiss">😘</div>

  <div class="title">
    <h1 id="titleText">Good night, Priya 🌙</h1>
    <p id="subText">one last visitor before you sleep...</p>
  </div>

  <div id="petBox">
    <div id="petInner">
      <svg id="pet" viewBox="0 0 210 200" xmlns="http://www.w3.org/2000/svg">
        <g class="breath">
          <path class="tail" d="M158 148 q34 4 34 -30 q0 -14 -12 -14" fill="none" stroke="#cfd8f7" stroke-width="7" stroke-linecap="round"/>
          <ellipse cx="105" cy="146" rx="54" ry="40" fill="#22304f" stroke="#cfd8f7" stroke-width="5"/>
          <ellipse cx="84"  cy="182" rx="13" ry="8" fill="#22304f" stroke="#cfd8f7" stroke-width="4"/>
          <ellipse cx="126" cy="182" rx="13" ry="8" fill="#22304f" stroke="#cfd8f7" stroke-width="4"/>
          <ellipse cx="105" cy="152" rx="24" ry="17" fill="#2e3f66" opacity=".9"/>
          <g class="headG">
            <path d="M66 44 l-6 -28 l26 14 z" fill="#22304f" stroke="#cfd8f7" stroke-width="5" stroke-linejoin="round"/>
            <path d="M144 44 l6 -28 l-26 14 z" fill="#22304f" stroke="#cfd8f7" stroke-width="5" stroke-linejoin="round"/>
            <path d="M64 32 l-2 -9 l9 5 z" fill="#8f7bd8"/>
            <path d="M146 32 l2 -9 l-9 5 z" fill="#8f7bd8"/>
            <circle cx="105" cy="72" r="46" fill="#22304f" stroke="#cfd8f7" stroke-width="5"/>
            <g class="eyesOpen">
              <circle cx="88"  cy="68" r="6" fill="#ffe9a8"/>
              <circle cx="122" cy="68" r="6" fill="#ffe9a8"/>
              <circle cx="89"  cy="69" r="2.8" fill="#101832"/>
              <circle cx="121" cy="69" r="2.8" fill="#101832"/>
            </g>
            <g class="eyesClosed">
              <path d="M82 69 q6 5 12 0"  stroke="#cfd8f7" stroke-width="4" fill="none" stroke-linecap="round"/>
              <path d="M116 69 q6 5 12 0" stroke="#cfd8f7" stroke-width="4" fill="none" stroke-linecap="round"/>
            </g>
            <path d="M101 84 l4 4 l4 -4 z" fill="#e8a0b4" stroke="#cfd8f7" stroke-width="2.5" stroke-linejoin="round"/>
            <path class="smileMouth" d="M105 90 q0 6 -6 7 M105 90 q0 6 6 7" stroke="#cfd8f7" stroke-width="3" fill="none" stroke-linecap="round"/>
            <ellipse class="yawnMouth" cx="105" cy="96" rx="9" ry="11" fill="#0d1327" stroke="#cfd8f7" stroke-width="3"/>
            <path d="M58 78 l-20 -4 M58 86 l-20 4 M152 78 l20 -4 M152 86 l20 4" stroke="#cfd8f7" stroke-width="3" stroke-linecap="round" opacity=".85"/>
            <circle class="blush" cx="72"  cy="86" r="7" fill="#e8a0b4" opacity="0"/>
            <circle class="blush" cx="138" cy="86" r="7" fill="#e8a0b4" opacity="0"/>
          </g>
        </g>
        <text class="zzz" x="160" y="30" font-size="24" fill="#cfd8f7">z z Z</text>
      </svg>
    </div>
  </div>

  <div id="bubble"></div>
  <div id="hint">tap anywhere to continue ▸</div>

  <div id="btns">
    <button class="btn" id="btnKiss">😘 Mwah! (send kiss)</button>
    <button class="btn" id="btnNoK">no kiss, just sleep 😐</button>
  </div>

  <div id="finale">
    <div class="card">
      <div class="big">💌🌙</div>
      <h2>KISS DELIVERED!</h2>
      <p id="finaleMsg">Filed safely under "reasons to smile" 😽<br>Sweet dreams, Priya. Meet you in dreamland — I'll be the cat chasing the moon 🌙💜</p>
      <small>— your goodnight guard cat 🐾</small>
      <button class="replay" id="replayBtn">Replay 🔁</button>
    </div>
  </div>

<script>
(function () {
  var petBox   = document.getElementById('petBox');
  var petInner = document.getElementById('petInner');
  var pet      = document.getElementById('pet');
  var bubble   = document.getElementById('bubble');
  var hint     = document.getElementById('hint');
  var btns     = document.getElementById('btns');
  var btnKiss  = document.getElementById('btnKiss');
  var btnNoK   = document.getElementById('btnNoK');
  var finale   = document.getElementById('finale');
  var titleT   = document.getElementById('titleText');
  var subT     = document.getElementById('subText');
  var kiss     = document.getElementById('kiss');
  var caught   = document.getElementById('caughtStar');
  var skyStars = document.getElementById('skyStars');

  var W = function(){ return window.innerWidth; };
  var petW = 165;

  for (var i = 0; i < 34; i++) {
    var s = document.createElement('div');
    s.className = 'star';
    var sz = 1.5 + Math.random()*2.5;
    s.style.width = sz+'px'; s.style.height = sz+'px';
    s.style.left = (Math.random()*100)+'%';
    s.style.top  = (Math.random()*50)+'%';
    s.style.animationDelay = (Math.random()*2.6)+'s';
    skyStars.appendChild(s);
  }

  function setAnim(cls) {
    petInner.className = '';
    void petInner.offsetWidth;
    if (cls) petInner.className = cls;
  }
  function movePet(xPercent, secs) {
    var x = (W()*xPercent/100) - petW/2;
    petBox.style.transitionDuration = secs + 's';
    petBox.style.transform = 'translateX(' + x + 'px)';
  }
  function say(t) {
    bubble.className = '';
    setTimeout(function(){ bubble.innerHTML = t; bubble.className = 'show'; }, 220);
  }
  function hideBubble(){ bubble.className = ''; }
  function drop(emoji, count, ms) {
    var n = 0;
    var t = setInterval(function(){
      var e = document.createElement('div');
      e.className = 'fall'; e.textContent = emoji;
      e.style.left = (5 + Math.random()*90) + '%';
      e.style.fontSize = (22 + Math.random()*16) + 'px';
      e.style.animationDuration = (2.6 + Math.random()*1.6) + 's';
      document.body.appendChild(e);
      setTimeout(function(){ if (e.parentNode) e.parentNode.removeChild(e); }, 4600);
      if (++n >= count) clearInterval(t);
    }, ms);
  }
  function sheepParade(count) {
    for (var i = 0; i < count; i++) {
      (function(i){
        setTimeout(function(){
          var sh = document.createElement('div');
          sh.className = 'sheep';
          sh.textContent = '🐑';
          sh.style.top = (30 + Math.random()*14) + '%';
          document.body.appendChild(sh);
          setTimeout(function(){ if (sh.parentNode) sh.parentNode.removeChild(sh); }, 7200);
        }, i * 900);
      })(i);
    }
  }

  var steps = [
    function () { // tip-toe in
      setAnim('walking');
      movePet(50, 3.2);
      setTimeout(function(){
        setAnim('');
        say('*tip-toes in* 🐾<br>shhh... it\'s bedtime, Priya 🌙');
      }, 3300);
    },
    function () { // yawn gag
      pet.setAttribute('class','yawning');
      say('see, even I\'m sleepy—<br><b>YAAAAWN</b> 🥱<br>...that was involuntary. embarrassing.');
    },
    function () { // sheep
      pet.setAttribute('class','');
      setAnim('dreamy');
      sheepParade(5);
      say('I pre-counted your sheep 🐑<br>all 47 of them. verified ✅<br>you\'re welcome 😌');
    },
    function () { // catch a star
      setAnim('');
      caught.className = 'fall';
      say('also I caught you a star 🌟<br>keep it under your pillow —<br>it\'s for good dreams only ✨');
    },
    function () {
      setAnim('dreamy');
      say('now: phone down 📵<br>eyes closed 😌<br>blanket mode: activated 🛏️');
    },
    function () { // THE ASK
      setAnim('');
      say('okay okay, I\'ll go... but first:<br><b style="font-size:20px">one goodnight kiss? 😘</b>');
      titleT.textContent = 'One last thing... 😘';
      subT.textContent = 'the cat will not sleep without it';
      hint.style.display = 'none';
      btns.className = 'show';
    }
  ];

  var idx = 0, busy = false;
  function next() {
    if (idx >= steps.length) return;
    busy = true;
    steps[idx++]();
    setTimeout(function(){ busy = false; }, 700);
  }
  document.body.addEventListener('click', function () {
    if (btns.className === 'show' || finale.className === 'show') return;
    if (busy) return;
    next();
  });

  /* the "no kiss" button falls asleep instead */
  var noTries = 0;
  btnNoK.addEventListener('click', function (e) {
    e.stopPropagation();
    noTries++;
    if (noTries === 1) {
      say('hm? sorry, this button is<br>already half asleep 😴');
      btnNoK.textContent = 'no ki... zzz 😪';
    } else {
      btnNoK.className = 'btn snoring';
      btnNoK.textContent = 'zzz... 💤';
      btnNoK.disabled = true;
      say('yeah, it\'s gone 💤<br>only one option left 😏');
    }
  });

  /* flying kiss! */
  btnKiss.addEventListener('click', function (e) {
    e.stopPropagation();
    var br = btnKiss.getBoundingClientRect();
    var pr = petBox.getBoundingClientRect();
    kiss.style.left = (br.left + br.width/2 - 17) + 'px';
    kiss.style.top  = (br.top - 10) + 'px';
    kiss.style.opacity = '1';
    btns.className = '';
    hideBubble();
    setTimeout(function(){
      kiss.style.left = (pr.left + pr.width/2 - 17) + 'px';
      kiss.style.top  = (pr.top + 30) + 'px';
    }, 60);
    setTimeout(function(){
      kiss.style.opacity = '0';
      pet.setAttribute('class','blushing');
      setAnim('lovefall');
      document.body.className = 'bright';
      drop('💜', 14, 130); drop('✨', 12, 160); drop('🌙', 5, 340);
      say('*kiss received* 😳💥<br>*cat.exe has stopped working* 💜');
      titleT.textContent = 'Mission complete 💜';
      subT.textContent = 'sleep well, dream better';
      setTimeout(function(){ finale.className = 'show'; }, 3400);
    }, 1500);
  });

  document.getElementById('replayBtn').addEventListener('click', function(){ location.reload(); });

  setTimeout(next, 900);
})();
</script>
</body>
</html>
