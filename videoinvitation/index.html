<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Wedding Invitation</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Video Container matching the vertical aspect ratio */
        .invitation-wrapper {
            position: relative;
            width: 100%;
            max-width: 450px; /* Perfect for mobile screens */
            height: 100vh;
            max-height: 900px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            background: #000;
        }

        /* Background Video */
        #bgVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Screen 1: The Click to Open Cover Layer */
        .cover-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.1);
            transition: opacity 0.8s ease;
        }

        .click-btn {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: transparent;
            border: none;
            cursor: pointer;
            outline: none;
            /* Invisible overlay placing right over the video's "click to open" badge */
        }

        /* Screen 2: Absolute Content Container inside the curtains */
        .content-layer {
            position: absolute;
            top: 14%; /* Positioned directly inside the golden frame */
            left: 10%;
            width: 80%;
            height: 72%;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            text-align: center;
            opacity: 0;
            transform: scale(0.9);
            transition: all 1.5s cubic-bezier(0.25, 1, 0.5, 1);
            pointer-events: none; /* Disabled until curtains open */
            padding: 20px 10px;
        }

        /* Active class triggered by JS */
        .content-layer.reveal {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }

        /* Beautiful Typography Details */
        .wedding-quote {
            font-size: 11px;
            font-style: italic;
            color: #554332;
            line-height: 1.5;
            font-weight: 500;
        }

        .couple-names {
            font-family: 'Great Vibes', cursive;
            font-size: 38px;
            color: #8b0000;
            margin: 5px 0;
            text-shadow: 1px 1px 0px rgba(255,255,255,0.5);
        }

        .details-box h3 {
            font-family: 'Cinzel', serif;
            font-size: 14px;
            color: #111;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .details-box p {
            font-size: 11px;
            color: #444;
            line-height: 1.4;
        }

        /* Interactive Scratch Card Feature */
        .scratch-container {
            position: relative;
            width: 180px;
            height: 80px;
            margin-top: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            border-radius: 8px;
            overflow: hidden;
        }

        .scratch-secret {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #fffdf9;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 1px solid #d4af37;
            border-radius: 8px;
        }

        .scratch-secret span {
            font-size: 9px;
            text-transform: uppercase;
            color: #777;
            letter-spacing: 1px;
        }

        .scratch-secret strong {
            font-family: 'Cinzel', serif;
            font-size: 13px;
            color: #8b0000;
        }

        #scratchCanvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
            cursor: pointer;
            touch-action: none;
        }
    </style>
</head>
<body>

    <div class="invitation-wrapper">
        
        <video id="bgVideo" playsinline muted>
            <source src="video/background-video.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>

        <div class="cover-layer" id="coverLayer">
            <button class="click-btn" onclick="openInvitation()"></button>
        </div>

        <div class="content-layer" id="contentLayer">
            
            <p class="wedding-quote">
                "Two souls with but a single thought,<br>two hearts that beat as one."
            </p>

            <div>
                <p style="font-size: 10px; letter-spacing: 3px; color: #777; text-transform: uppercase;">Save The Date</p>
                <h1 class="couple-names">Veer & Zaara</h1>
            </div>

            <div class="details-box">
                <h3>DECEMBER 12, 2026</h3>
                <p><strong>Grand Ballroom, Royal Palace Resort</strong></p>
                <p style="margin-top: 3px;">Palace High Street, Mumbai</p>
            </div>

            <div>
                <p style="font-size: 9px; color: #666; margin-bottom: 4px; letter-spacing: 1px;">👇 SCRATCH TO REVEAL VENUE CODE</p>
                <div class="scratch-container">
                    <div class="scratch-secret">
                        <span>Access Pass Code</span>
                        <strong>#ROYALWED2026</strong>
                    </div>
                    <canvas id="scratchCanvas" width="180" height="80"></canvas>
                </div>
            </div>

        </div>

    </div>

    <script>
        const video = document.getElementById('bgVideo');
        const coverLayer = document.getElementById('coverLayer');
        const contentLayer = document.getElementById('contentLayer');

        // Force video to stay paused on frame 0 upon initial load
        video.currentTime = 0;

        function openInvitation() {
            // Hide the initial action click trigger layer
            coverLayer.style.opacity = '0';
            setTimeout(() => coverLayer.style.display = 'none', 800);

            // Unmute and Play the video
            video.muted = false; 
            video.play();

            // Track time execution to inject code elements right when curtains finish expanding (around 2.5 - 3 seconds)
            setTimeout(() => {
                contentLayer.classList.add('reveal');
                initScratchCard();
            }, 2800);
        }

        // SCRATCH CARD INTERACTION ENGINE
        function initScratchCard() {
            const canvas = document.getElementById('scratchCanvas');
            const ctx = canvas.getContext('2d');
            let isDrawing = false;

            // Paint elegant gold canvas overlay scratch mask layer
            ctx.fillStyle = '#c5a059';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Add decorative pattern text to scratch canvas surface
            ctx.font = 'bold 10px Montserrat';
            ctx.fillStyle = '#fff';
            ctx.textAlign = 'center';
            ctx.fillText('SCRATCH HERE', canvas.width / 2, canvas.height / 2 + 3);

            // Scratch actions handler functions
            function scratch(e) {
                if (!isDrawing) return;
                
                // Track mouse or finger touch coordinates relative to the canvas bounding box
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX || e.touches[0].clientX) - rect.left;
                const y = (e.clientY || e.touches[0].clientY) - rect.top;

                // Set composition method to destination-out to erase pixels cleanly
                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath();
                ctx.arc(x, y, 16, 0, Math.PI * 2);
                ctx.fill();
            }

            // Event Listeners for both PC Mouse & Mobile Touch Displays
            canvas.addEventListener('mousedown', () => isDrawing = true);
            canvas.addEventListener('mouseup', () => isDrawing = false);
            canvas.addEventListener('mousemove', scratch);

            canvas.addEventListener('touchstart', (e) => { isDrawing = true; scratch(e); });
            canvas.addEventListener('touchend', () => isDrawing = false);
            canvas.addEventListener('touchmove', scratch);
        }
    </script>
</body>
</html>
