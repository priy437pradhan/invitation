<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>A little question for you 💗</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; }
  body {
    font-family:'Quicksand',sans-serif;
    background:
      radial-gradient(circle at 18% 20%, #ffe3ef 0%, transparent 42%),
      radial-gradient(circle at 82% 15%, #ffe9d6 0%, transparent 40%),
      radial-gradient(circle at 50% 95%, #f4e0ff 0%, transparent 55%),
      linear-gradient(160deg,#fff4f8 0%,#ffeef5 45%,#fdeaf3 100%);
    min-height:100dvh;
    display:flex; align-items:center; justify-content:center;
    padding:20px; overflow:hidden; position:relative;
    color:#5b3a4a;
  }

  /* floating hearts background */
  .bg-heart { position:fixed; bottom:-40px; font-size:22px; opacity:.55;
    animation:float linear infinite; pointer-events:none; z-index:0; will-change:transform; }
  @keyframes float {
    0%   { transform:translateY(0) rotate(0deg); opacity:0; }
    12%  { opacity:.6; }
    100% { transform:translateY(-115dvh) rotate(340deg); opacity:0; }
  }

  .card {
    position:relative; z-index:2;
    width:100%; max-width:420px;
    background:rgba(255,255,255,.72);
    backdrop-filter:blur(8px);
    border:2px solid #ffd0e2;
    border-radius:32px;
    padding:30px 26px 34px;
    box-shadow:0 24px 60px -18px rgba(214,90,140,.45), 0 4px 0 #ffe0ec inset;
    text-align:center;
    overflow:hidden;
  }

  .cat-wrap { display:flex; justify-content:center; margin-bottom:8px; }
  svg.cat { width:190px; height:auto; display:block; overflow:visible;
    animation:bob 3s ease-in-out infinite; }
  @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }

  /* cat parts */
  .stroke { fill:none; stroke:#4a3340; stroke-width:5.5; stroke-linecap:round; stroke-linejoin:round; }
  .fill-body { fill:#fff7fb; }
  .blush { fill:#ffb1cf; opacity:.85; }
  .eye { fill:#4a3340; }
  .tail { transform-origin:118px 150px; animation:tail 2.4s ease-in-out infinite; }
  @keyframes tail { 0%,100%{transform:rotate(-6deg)} 50%{transform:rotate(12deg)} }
  .lid { fill:#fff7fb; transform-origin:center; transform:scaleY(0);
    animation:blink 4.2s ease-in-out infinite; }
  @keyframes blink { 0%,92%,100%{transform:scaleY(0)} 95%,97%{transform:scaleY(1)} }
  .heart-hold { transform-origin:100px 128px; animation:beat 1.3s ease-in-out infinite; }
  @keyframes beat { 0%,100%{transform:scale(1)} 45%{transform:scale(1.14)} }

  /* happy state extras (hidden until yes) */
  .hearteye { opacity:0; transition:opacity .3s; }
  .happy .hearteye { opacity:1; }
  .happy .eye, .happy .lid { opacity:0; }

  h1 { font-family:'Caveat',cursive; font-size:34px; line-height:1.15; color:#d94f88;
    margin:6px 0 4px; }
  .sub { font-size:14.5px; color:#9c6f83; margin-bottom:22px; font-weight:600; }

  .btns { position:relative; display:flex; gap:14px; justify-content:center;
    align-items:center; min-height:64px; }

  button { font-family:'Quicksand',sans-serif; font-weight:700; cursor:pointer;
    border:none; border-radius:16px; transition:transform .15s ease, box-shadow .2s ease; }

  #yes {
    background:linear-gradient(135deg,#ff6fa3,#ff4f86);
    color:#fff; font-size:19px; padding:15px 34px;
    box-shadow:0 10px 22px -8px rgba(255,79,134,.9);
  }
  #yes:hover { transform:translateY(-2px) scale(1.04); }
  #yes:active { transform:scale(.97); }

  #no {
    background:#fff; color:#b98aa0; font-size:16px; padding:13px 26px;
    border:2px solid #ffd0e2; box-shadow:0 6px 14px -6px rgba(185,138,160,.5);
    position:relative;
  }

  /* result screen */
  .result { display:none; }
  .result.show { display:block; animation:pop .5s cubic-bezier(.2,1.3,.4,1); }
  @keyframes pop { 0%{transform:scale(.6);opacity:0} 100%{transform:scale(1);opacity:1} }
  .result h1 { font-size:40px; margin-bottom:8px; }
  .result .sub { font-size:16px; margin-bottom:0; }
  .signoff { margin-top:16px; font-family:'Caveat',cursive; font-size:20px; color:#d94f88; }

  .credit { position:fixed; bottom:8px; left:0; right:0; text-align:center;
    font-size:11px; color:#c99cb0; z-index:2; font-weight:600; }
</style>
</head>
<body>

<div class="card" id="card">

  <!-- ===== ASK SCREEN ===== -->
  <div id="ask">
    <div class="cat-wrap">
      <svg class="cat" id="cat" viewBox="0 0 200 200" aria-label="cute cat">
        <!-- tail -->
        <g class="tail">
          <path class="stroke" d="M118 150 q40 8 34 -34 q-4 -22 -22 -18"/>
        </g>
        <!-- body -->
        <path class="stroke fill-body" d="M64 170 q-14 -46 12 -70 q24 -20 48 0 q26 24 12 70 Z"/>
        <!-- paws -->
        <path class="stroke fill-body" d="M84 168 q6 8 14 0"/>
        <path class="stroke fill-body" d="M104 168 q6 8 14 0"/>
        <!-- little held heart -->
        <g class="heart-hold">
          <path d="M100 118 q-9 -12 -18 -4 q-8 8 2 18 l16 14 l16 -14 q10 -10 2 -18 q-9 -8 -18 4 Z"
                fill="#ff6fa3" stroke="#e14b7d" stroke-width="3" stroke-linejoin="round"/>
        </g>
        <!-- head -->
        <path class="stroke fill-body" d="M64 74 L54 40 L86 60 q14 -6 28 0 L146 40 L136 74"/>
        <circle class="stroke fill-body" cx="100" cy="86" r="40"/>
        <!-- inner ears -->
        <path d="M66 52 l8 18 l12 -8 Z" fill="#ffcfe0"/>
        <path d="M134 52 l-8 18 l-12 -8 Z" fill="#ffcfe0"/>
        <!-- blush -->
        <ellipse class="blush" cx="74" cy="96" rx="9" ry="6"/>
        <ellipse class="blush" cx="126" cy="96" rx="9" ry="6"/>
        <!-- eyes -->
        <circle class="eye" cx="86" cy="84" r="5.4"/>
        <circle class="eye" cx="114" cy="84" r="5.4"/>
        <circle cx="88" cy="82" r="1.8" fill="#fff"/>
        <circle cx="116" cy="82" r="1.8" fill="#fff"/>
        <!-- blink lids -->
        <rect class="lid" x="79" y="78" width="14" height="12" rx="6"/>
        <rect class="lid" x="107" y="78" width="14" height="12" rx="6"/>
        <!-- heart eyes (happy) -->
        <g class="hearteye">
          <path d="M86 80 q-5 -6 -9 -1 q-4 5 1 9 l8 8 l8 -8 q5 -4 1 -9 q-4 -5 -9 1 Z" fill="#ff4f86"/>
          <path d="M114 80 q-5 -6 -9 -1 q-4 5 1 9 l8 8 l8 -8 q5 -4 1 -9 q-4 -5 -9 1 Z" fill="#ff4f86"/>
        </g>
        <!-- nose + mouth -->
        <path class="stroke" d="M97 96 l6 0 l-3 4 Z" stroke-width="3.5"/>
        <path class="stroke" d="M100 100 q-6 6 -12 2 M100 100 q6 6 12 2" stroke-width="3.5"/>
        <!-- whiskers -->
        <path class="stroke" d="M62 90 l-18 -4 M62 98 l-18 2" stroke-width="3"/>
        <path class="stroke" d="M138 90 l18 -4 M138 98 l18 2" stroke-width="3"/>
      </svg>
    </div>

    <h1 id="qtext">Will you be mine… forever? 💗</h1>
    <p class="sub">go on, pick one 👀 (no pressure hehe)</p>

    <div class="btns" id="btns">
      <button id="yes">Yes 💕</button>
      <button id="no">No</button>
    </div>
  </div>

  <!-- ===== RESULT SCREEN ===== -->
  <div class="result" id="result">
    <div class="cat-wrap">
      <svg class="cat happy" viewBox="0 0 200 200" aria-label="happy cat">
        <g class="tail"><path class="stroke" d="M118 150 q40 8 34 -34 q-4 -22 -22 -18"/></g>
        <path class="stroke fill-body" d="M64 170 q-14 -46 12 -70 q24 -20 48 0 q26 24 12 70 Z"/>
        <g class="heart-hold">
          <path d="M100 116 q-11 -14 -22 -5 q-10 9 3 22 l19 17 l19 -17 q13 -13 3 -22 q-11 -9 -22 5 Z"
                fill="#ff4f86" stroke="#e14b7d" stroke-width="3" stroke-linejoin="round"/>
        </g>
        <path class="stroke fill-body" d="M64 74 L54 40 L86 60 q14 -6 28 0 L146 40 L136 74"/>
        <circle class="stroke fill-body" cx="100" cy="86" r="40"/>
        <path d="M66 52 l8 18 l12 -8 Z" fill="#ffcfe0"/>
        <path d="M134 52 l-8 18 l-12 -8 Z" fill="#ffcfe0"/>
        <ellipse class="blush" cx="72" cy="98" rx="10" ry="7"/>
        <ellipse class="blush" cx="128" cy="98" rx="10" ry="7"/>
        <path d="M86 80 q-5 -6 -9 -1 q-4 5 1 9 l8 8 l8 -8 q5 -4 1 -9 q-4 -5 -9 1 Z" fill="#ff4f86"/>
        <path d="M114 80 q-5 -6 -9 -1 q-4 5 1 9 l8 8 l8 -8 q5 -4 1 -9 q-4 -5 -9 1 Z" fill="#ff4f86"/>
        <path class="stroke" d="M97 96 l6 0 l-3 4 Z" stroke-width="3.5"/>
        <path class="stroke" d="M86 104 q14 10 28 0" stroke-width="4"/>
        <path class="stroke" d="M62 90 l-18 -4 M62 98 l-18 2" stroke-width="3"/>
        <path class="stroke" d="M138 90 l18 -4 M138 98 l18 2" stroke-width="3"/>
      </svg>
    </div>
    <h1>Yayyy!! 🥳💗</h1>
    <p class="sub">I knew it. Best decision of your life, obviously.</p>
    <p class="signoff">— your favourite person 😽</p>
  </div>

</div>

<div class="credit">made with 💗 just for you</div>

<script>
  // ---- floating background hearts ----
  (function () {
    var emojis = ['💗','💕','💖','🩷','💓','💞'];
    function spawn() {
      var h = document.createElement('div');
      h.className = 'bg-heart';
      h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      h.style.left = Math.random() * 100 + 'vw';
      var dur = 7 + Math.random() * 7;
      h.style.animationDuration = dur + 's';
      h.style.fontSize = (16 + Math.random() * 20) + 'px';
      document.body.appendChild(h);
      setTimeout(function () { h.remove(); }, dur * 1000);
    }
    for (var i = 0; i < 8; i++) setTimeout(spawn, i * 500);
    setInterval(spawn, 900);
  })();

  // ---- the "No" button that refuses to be clicked ----
  var noBtn  = document.getElementById('no');
  var yesBtn = document.getElementById('yes');
  var btns   = document.getElementById('btns');
  var qtext  = document.getElementById('qtext');

  var pleas = ['No','Nope?','You sure?','Really??','Think again 🥺',
               'Pretty please 🥹','Don\'t do it 😿','Last chance!','😾','💔'];
  var dodges = 0;

  function runAway() {
    dodges++;

    // grow YES, shrink NO
    var yScale = Math.min(1 + dodges * 0.12, 2.1);
    yesBtn.style.transform = 'scale(' + yScale + ')';
    var nScale = Math.max(1 - dodges * 0.09, 0.4);
    noBtn.style.fontSize = (16 * nScale) + 'px';
    noBtn.style.padding = (13 * nScale) + 'px ' + (26 * nScale) + 'px';

    // change its text to beg
    if (dodges < pleas.length) noBtn.textContent = pleas[dodges];

    // teleport within the card, absolutely positioned
    var card = document.getElementById('card').getBoundingClientRect();
    var b = noBtn.getBoundingClientRect();
    var maxX = card.width  - b.width  - 24;
    var maxY = card.height - b.height - 24;
    var x = Math.random() * Math.max(maxX, 40);
    var y = Math.random() * Math.max(maxY, 40);
    noBtn.style.position = 'fixed';
    noBtn.style.left = (card.left + x) + 'px';
    noBtn.style.top  = (card.top  + y) + 'px';

    // swap question after a few dodges
    if (dodges === 3) qtext.textContent = 'Come onnn, just say yes 🥺';
    if (dodges === 6) qtext.textContent = 'The Yes button is right there 👉👈';
  }

  noBtn.addEventListener('mouseover', runAway);
  noBtn.addEventListener('touchstart', function (e) { e.preventDefault(); runAway(); }, { passive: false });
  noBtn.addEventListener('click', function (e) { e.preventDefault(); runAway(); });

  // ---- YES → celebration ----
  yesBtn.addEventListener('click', function () {
    document.getElementById('ask').style.display = 'none';
    document.getElementById('result').classList.add('show');
    burst();
  });

  function burst() {
    var emojis = ['💗','💕','🎉','💖','✨','🩷','😽','💞'];
    for (var i = 0; i < 70; i++) {
      (function () {
        var p = document.createElement('div');
        p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        p.style.position = 'fixed';
        p.style.left = '50%';
        p.style.top = '48%';
        p.style.fontSize = (18 + Math.random() * 22) + 'px';
        p.style.zIndex = 50;
        p.style.pointerEvents = 'none';
        document.body.appendChild(p);
        var angle = Math.random() * Math.PI * 2;
        var dist = 120 + Math.random() * 240;
        var dx = Math.cos(angle) * dist;
        var dy = Math.sin(angle) * dist;
        var rot = (Math.random() * 720 - 360);
        p.animate([
          { transform: 'translate(-50%,-50%) rotate(0deg)', opacity: 1 },
          { transform: 'translate(calc(-50% + ' + dx + 'px), calc(-50% + ' + dy + 'px)) rotate(' + rot + 'deg)', opacity: 0 }
        ], { duration: 1100 + Math.random() * 700, easing: 'cubic-bezier(.15,.6,.3,1)' });
        setTimeout(function () { p.remove(); }, 1900);
      })();
    }
  }
</script>
</body>
</html>
