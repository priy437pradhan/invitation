<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Priya... 🥺</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; overflow:hidden; }
  body {
    font-family:'Baloo 2', 'Segoe UI', system-ui, sans-serif;
    background: linear-gradient(180deg, #3b2154 0%, #6b2d5c 45%, #c4536a 78%, #f2926f 100%);
    position:fixed; width:100%;
    -webkit-user-select:none; user-select:none;
  }

  /* ---------- sky ---------- */
  .star { position:absolute; background:#ffe9c9; border-radius:50%; opacity:.8;
          animation: twinkle 2.4s ease-in-out infinite; }
  @keyframes twinkle { 0%,100%{opacity:.25; transform:scale(.8);} 50%{opacity:.9; transform:scale(1.15);} }

  .moon {
    position:absolute; top:7%; right:9%;
    width:64px; height:64px; border-radius:50%;
    background: radial-gradient(circle at 38% 35%, #fff7e0, #ffdf9e 70%);
    box-shadow: 0 0 40px 12px rgba(255,224,158,.35);
    animation: moonfloat 6s ease-in-out infinite;
  }
  @keyframes moonfloat { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-8px);} }

  /* ---------- ground ---------- */
  .ground {
    position:absolute; bottom:0; left:0; right:0; height:15%;
    background: linear-gradient(180deg, #7c3f52 0%, #5b2b44 100%);
    border-radius: 50% 50% 0 0 / 26px 26px 0 0;
  }

  /* ---------- title ---------- */
  .title {
    position:absolute; top:9%; left:0; right:0; text-align:center;
    color:#ffe9d6; padding:0 24px; z-index:5;
    text-shadow: 0 3px 14px rgba(60,20,60,.55);
  }
  .title h1 { font-size:clamp(26px,7.5vw,38px); font-weight:800; letter-spacing:.5px; }
  .title p  { font-size:15px; opacity:.85; font-weight:500; margin-top:2px; }

  /* ---------- cat ---------- */
  #catBox {
    position:absolute; bottom:11%; left:0;
    width:140px; z-index:10;
    transform: translateX(-160px);
    transition: transform 3.2s cubic-bezier(.45,.05,.45,1);
    will-change: transform;
  }
  #catInner { width:100%; animation:none; transform-origin:50% 92%; }
  #catImg { width:100%; display:block; filter: drop-shadow(0 10px 10px rgba(40,10,40,.4)); }

  .walking   { animation: walkbob .5s ease-in-out infinite !important; }
  @keyframes walkbob {
    0%,100% { transform: translateY(0) rotate(-2.5deg); }
    50%     { transform: translateY(-9px) rotate(2.5deg); }
  }
  .sad       { animation: sadsway 2.2s ease-in-out infinite !important; filter:saturate(.8); }
  @keyframes sadsway {
    0%,100% { transform: rotate(-3deg) scale(.96); }
    50%     { transform: rotate(3deg) scale(.96); }
  }
  .begging   { animation: begshake .16s linear infinite !important; }
  @keyframes begshake {
    0%{transform:translateX(-3px) rotate(-2deg);} 50%{transform:translateX(3px) rotate(2deg);} 100%{transform:translateX(-3px) rotate(-2deg);}
  }
  .puppyeyes { animation: puppy 1.4s ease-in-out infinite !important; }
  @keyframes puppy {
    0%,100%{ transform:scale(1); } 50%{ transform:scale(1.14) translateY(-6px); }
  }
  .flip      { animation: flipspin 1.1s cubic-bezier(.4,.1,.4,1) 1 !important; }
  @keyframes flipspin {
    0%{ transform:rotate(0) translateY(0);} 45%{ transform:rotate(200deg) translateY(-70px);} 100%{ transform:rotate(360deg) translateY(0);}
  }
  .happyjump { animation: hjump .55s ease-in-out infinite !important; }
  @keyframes hjump {
    0%,100%{ transform:translateY(0) scale(1,1);}
    30%    { transform:translateY(0) scale(1.08,.9);}
    60%    { transform:translateY(-34px) scale(.94,1.08) rotate(4deg);}
  }
  .faceleft  #catImg { transform: scaleX(-1); }

  /* sorry sign the cat holds */
  #sign {
    position:absolute; top:-56px; left:50%; transform:translateX(-50%) rotate(-4deg) scale(0);
    background:#fff6e6; color:#c0392b; border:3px solid #d96a4e; border-radius:10px;
    font-weight:800; font-size:15px; padding:6px 12px; white-space:nowrap;
    box-shadow:0 6px 14px rgba(40,10,40,.35);
    transition: transform .45s cubic-bezier(.34,1.56,.64,1);
  }
  #sign.show { transform:translateX(-50%) rotate(-4deg) scale(1); }
  #sign:after {
    content:''; position:absolute; bottom:-16px; left:50%; margin-left:-2px;
    width:4px; height:16px; background:#a9765a;
  }

  /* ---------- speech bubble ---------- */
  #bubble {
    position:absolute; z-index:20;
    left:50%; bottom:46%;
    transform: translateX(-50%) scale(0);
    transform-origin: 50% 100%;
    max-width: 78vw;
    background:#fffdf7; color:#4a2b3a;
    border-radius:20px; padding:13px 17px;
    font-size:17px; font-weight:700; line-height:1.35; text-align:center;
    box-shadow: 0 10px 26px rgba(40,10,50,.4);
    transition: transform .4s cubic-bezier(.34,1.56,.64,1);
  }
  #bubble.show { transform: translateX(-50%) scale(1); }
  #bubble:after {
    content:''; position:absolute; bottom:-11px; left:50%; margin-left:-11px;
    border-left:11px solid transparent; border-right:11px solid transparent;
    border-top:13px solid #fffdf7;
  }

  /* ---------- tap hint ---------- */
  #hint {
    position:absolute; bottom:4%; left:0; right:0; text-align:center;
    color:#ffe9d6; opacity:.75; font-size:13px; font-weight:600; z-index:5;
    animation: hintpulse 1.6s ease-in-out infinite;
  }
  @keyframes hintpulse { 0%,100%{opacity:.35;} 50%{opacity:.85;} }

  /* ---------- buttons ---------- */
  #btns {
    position:absolute; bottom:5%; left:0; right:0; z-index:30;
    display:none; flex-direction:column; gap:12px; align-items:center; padding:0 30px;
  }
  #btns.show { display:flex; }
  .btn {
    width:100%; max-width:320px; border:none; border-radius:50px;
    font-family:inherit; font-size:18px; font-weight:800; padding:15px 20px;
    cursor:pointer; box-shadow: 0 8px 20px rgba(30,5,40,.45);
    transition: transform .12s ease;
  }
  .btn:active { transform:scale(.95); }
  #btnYes { background:linear-gradient(135deg,#ffb84d,#ff7854); color:#5a1f16; }
  #btnNo  { background:rgba(255,255,255,.14); color:#ffd9cf; border:2px solid rgba(255,217,207,.45);
            font-size:15px; padding:12px 20px; max-width:260px;
            transition: transform .3s ease, opacity .3s ease; }

  /* ---------- falling items (momos / hearts / rose) ---------- */
  .fall {
    position:absolute; top:-60px; z-index:8; font-size:28px;
    animation: falldown linear 1 forwards;
    pointer-events:none;
  }
  @keyframes falldown {
    0%   { transform: translateY(0) rotate(0deg); opacity:1; }
    90%  { opacity:1; }
    100% { transform: translateY(110vh) rotate(340deg); opacity:0; }
  }

  .floatheart {
    position:absolute; bottom:-40px; z-index:4; font-size:20px; opacity:0;
    animation: floatup linear 1 forwards; pointer-events:none;
  }
  @keyframes floatup {
    0%   { transform: translateY(0) scale(.7); opacity:0; }
    12%  { opacity:.85; }
    100% { transform: translateY(-105vh) scale(1.25) rotate(24deg); opacity:0; }
  }

  /* ---------- final card ---------- */
  #finale {
    position:absolute; inset:0; z-index:40; display:none;
    align-items:center; justify-content:center; padding:26px;
    background: rgba(38,14,48,.55); backdrop-filter: blur(3px);
  }
  #finale.show { display:flex; }
  .card {
    background:#fffdf7; border-radius:26px; padding:30px 24px; text-align:center;
    max-width:340px; width:100%; color:#4a2b3a;
    box-shadow:0 20px 50px rgba(20,5,30,.5);
    animation: cardpop .5s cubic-bezier(.34,1.56,.64,1) 1;
  }
  @keyframes cardpop { 0%{transform:scale(.6); opacity:0;} 100%{transform:scale(1); opacity:1;} }
  .card .big { font-size:52px; line-height:1; }
  .card h2 { font-size:24px; font-weight:800; margin:10px 0 6px; color:#c0392b; }
  .card p  { font-size:16px; font-weight:600; line-height:1.45; }
  .card small { display:block; margin-top:14px; font-size:13px; opacity:.6; font-weight:600; }
  .replay { margin-top:18px; background:#ffb84d; border:none; border-radius:40px;
            font-family:inherit; font-weight:800; font-size:15px; padding:11px 26px;
            color:#5a1f16; cursor:pointer; box-shadow:0 6px 14px rgba(90,31,22,.35); }
</style>
</head>

  <div id="bubble"></div>
  <div id="hint">tap anywhere to continue ▸</div>

  <div id="btns">
    <button class="btn" id="btnYes">Okay fine... momos 😤🥟</button>
    <button class="btn" id="btnNo">Still angry 😠</button>
  </div>

  <div id="finale">
    <div class="card">
      <div class="big">🥟❤️</div>
      <h2>MOMO DATE CONFIRMED!</h2>
      <p id="finaleMsg">Yayyy! Extra spicy chutney, extra momos, and zero fights. I love you, Priya! 🐱💕</p>
      <small>— your idiot cat 🐾</small>
      <button class="replay" id="replayBtn">Replay 🔁</button>
    </div>
  </div>

<script>
(function () {
  var catBox   = document.getElementById('catBox');
  var catInner = document.getElementById('catInner');
  var bubble   = document.getElementById('bubble');
  var hint     = document.getElementById('hint');
  var btns     = document.getElementById('btns');
  var btnYes   = document.getElementById('btnYes');
  var btnNo    = document.getElementById('btnNo');
  var sign     = document.getElementById('sign');
  var finale   = document.getElementById('finale');
  var titleT   = document.getElementById('titleText');
  var subT     = document.getElementById('subText');
  var sky      = document.getElementById('sky');

  var W = function(){ return window.innerWidth; };
  var catW = 140;

  /* ---- stars ---- */
  for (var i = 0; i < 26; i++) {
    var s = document.createElement('div');
    s.className = 'star';
    var sz = 1.5 + Math.random() * 2.5;
    s.style.width = sz + 'px'; s.style.height = sz + 'px';
    s.style.left = (Math.random() * 100) + '%';
    s.style.top  = (Math.random() * 45) + '%';
    s.style.animationDelay = (Math.random() * 2.4) + 's';
    sky.appendChild(s);
  }

  /* ---- ambient floating hearts ---- */
  setInterval(function () {
    var h = document.createElement('div');
    h.className = 'floatheart';
    h.textContent = Math.random() < 0.5 ? '💗' : '💖';
    h.style.left = (5 + Math.random() * 90) + '%';
    h.style.animationDuration = (6 + Math.random() * 4) + 's';
    document.body.appendChild(h);
    setTimeout(function(){ if (h.parentNode) h.parentNode.removeChild(h); }, 11000);
  }, 1800);

  /* ---- helpers ---- */
  function setAnim(cls) {
    catInner.className = '';
    // force reflow so re-adding same animation restarts it
    void catInner.offsetWidth;
    if (cls) catInner.className = cls;
  }
  function moveCat(xPercent, secs) {
    var x = (W() * xPercent / 100) - catW / 2;
    catBox.style.transitionDuration = secs + 's';
    catBox.style.transform = 'translateX(' + x + 'px)';
  }
  function say(text) {
    bubble.className = '';
    setTimeout(function () {
      bubble.innerHTML = text;
      // place bubble roughly above the cat
      bubble.className = 'show';
    }, 220);
  }
  function hideBubble(){ bubble.className = ''; }

  function drop(emoji, count, spreadMs) {
    var n = 0;
    var t = setInterval(function () {
      var d = document.createElement('div');
      d.className = 'fall';
      d.textContent = emoji;
      d.style.left = (5 + Math.random() * 90) + '%';
      d.style.fontSize = (22 + Math.random() * 16) + 'px';
      d.style.animationDuration = (2.2 + Math.random() * 1.6) + 's';
      document.body.appendChild(d);
      setTimeout(function(){ if (d.parentNode) d.parentNode.removeChild(d); }, 4200);
      n++;
      if (n >= count) clearInterval(t);
    }, spreadMs);
  }

  /* ---- scene script: each step runs, then waits for tap ---- */
  var angerLevel = 0;
  var steps = [
    function () { // walk in
      setAnim('walking');
      moveCat(50, 3.2);
      setTimeout(function () { setAnim(''); say('Priya... 🥺'); }, 3300);
    },
    function () { say('I know you\'re angry with me... 😿'); },
    function () {
      setAnim('sad');
      say('and you have every right to be. I was being an idiot 🐒');
    },
    function () {
      setAnim('');
      sign.className = 'show';
      say('I\'m sorry. Really really <b>REALLY</b> sorry 🙏');
    },
    function () { // funny flip across screen
      sign.className = '';
      hideBubble();
      setAnim('walking');
      moveCat(78, 1.4);
      setTimeout(function () {
        setAnim('flip');
        setTimeout(function () {
          setAnim('');
          say('Look!! I did a flip for you 🤸<br>10/10?? 😸');
        }, 1150);
      }, 1450);
    },
    function () {
      catBox.classList.add('faceleft');
      setAnim('walking');
      moveCat(50, 1.6);
      setTimeout(function () {
        catBox.classList.remove('faceleft');
        setAnim('puppyeyes');
        say('Pleeeease forgive me? 🥹🥹🥹');
      }, 1700);
    },
    function () {
      setAnim('');
      drop('🌹', 8, 180);
      say('I even brought roses 🌹<br>(okay fine, emoji roses... budget issue 😅)');
    },
    function () { // THE ASK
      setAnim('puppyeyes');
      drop('🥟', 14, 140);
      say('Chalo na...<br><b style="font-size:22px">MOMOS? 🥟🥟</b><br>Your favourite! My treat — extra spicy chutney 🌶️');
      titleT.textContent = 'Momo peace treaty 🥟';
      subT.textContent = 'terms & conditions: forgive the cat';
      hint.style.display = 'none';
      btns.className = 'show';
      waiting = false; // stop tap-advance; buttons take over
    }
  ];

  var idx = 0, waiting = false, busy = false;

  function next() {
    if (idx >= steps.length) return;
    busy = true;
    steps[idx++]();
    // small lock so double-taps don't skip
    setTimeout(function(){ busy = false; }, 700);
  }

  document.body.addEventListener('click', function (e) {
    if (btns.className === 'show' || finale.className === 'show') return;
    if (busy) return;
    // tapping the cat = little squeak
    next();
  });

  /* ---- angry button escalation ---- */
  var begLines = [
    { txt: 'Okay okay... <b>2 plates</b> of momos!! 🥟🥟<br>Steam AND fried 😳', anim: 'begging', momos: 10 },
    { txt: '<b>UNLIMITED MOMOS</b> 🥟♾️<br>+ ice cream after 🍦<br>+ I\'ll carry your bag forever 🎒', anim: 'begging', momos: 18 },
    { txt: 'FINE. Momos + ice cream + shopping<br>+ you win every argument till 2030 🏳️🏳️🏳️', anim: 'puppyeyes', momos: 26 }
  ];

  btnNo.addEventListener('click', function (e) {
    e.stopPropagation();
    if (angerLevel < begLines.length) {
      var b = begLines[angerLevel];
      setAnim(b.anim);
      say(b.txt);
      drop('🥟', b.momos, 110);
      angerLevel++;
      // the angry button slowly gives up
      var sc = 1 - angerLevel * 0.18;
      btnNo.style.transform = 'scale(' + sc + ')';
      if (angerLevel === begLines.length) {
        btnNo.textContent = '...fine, this button surrenders 🏳️';
        btnNo.disabled = true;
        btnNo.style.opacity = '.45';
        setAnim('puppyeyes');
      }
    }
  });

  /* ---- yes! ---- */
  btnYes.addEventListener('click', function (e) {
    e.stopPropagation();
    btns.className = '';
    hideBubble();
    sign.className = '';
    setAnim('happyjump');
    drop('🥟', 24, 90);
    drop('❤️', 16, 130);
    drop('🎉', 12, 160);
    say('YESSS!! 😻🎉');
    setTimeout(function () { finale.className = 'show'; }, 2200);
  });

  document.getElementById('replayBtn').addEventListener('click', function () {
    location.reload();
  });

  /* ---- start ---- */
  setTimeout(next, 900);
})();
</script>
</body>
</html>
