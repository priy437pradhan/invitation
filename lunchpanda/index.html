<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Priya, lunch check 🍱</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; overflow:hidden; }
  body {
    font-family:'Baloo 2','Segoe UI',system-ui,sans-serif;
    position:fixed; width:100%;
    background:linear-gradient(180deg,#d8f3dc 0%,#b7e4c7 45%,#95d5a6 78%,#74c68f 100%);
    -webkit-user-select:none; user-select:none;
  }

  #sunmid {
    position:absolute; top:6%; right:9%; z-index:1;
    width:70px; height:70px; border-radius:50%;
    background:radial-gradient(circle at 40% 36%,#fffbe0,#ffe066 75%);
    box-shadow:0 0 50px 20px rgba(255,224,102,.45);
    animation:sunmid 7s ease-in-out infinite;
  }
  @keyframes sunmid { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-8px);} }

  /* bamboo stalks background */
  .bamboo {
    position:absolute; bottom:0; width:16px; z-index:2;
    background:linear-gradient(90deg,#4d9d5f,#71bd82 45%,#4d9d5f);
    border-radius:8px;
    animation:bsway 5s ease-in-out infinite; transform-origin:bottom;
  }
  .bamboo:before, .bamboo:after {
    content:''; position:absolute; left:-2px; right:-2px; height:4px;
    background:#3c7f4c; border-radius:3px;
  }
  .bamboo:before { top:30%; } .bamboo:after { top:62%; }
  @keyframes bsway { 0%,100%{transform:rotate(-1.5deg);} 50%{transform:rotate(1.5deg);} }
  .leaf {
    position:absolute; z-index:2; font-size:30px; opacity:.9;
    animation:bsway 4s ease-in-out infinite;
  }

  .ground {
    position:absolute; bottom:0; left:0; right:0; height:15%; z-index:5;
    background:linear-gradient(180deg,#5aa96c 0%,#448a55 100%);
    border-radius:50% 50% 0 0 / 26px 26px 0 0;
  }

  .title {
    position:absolute; top:7%; left:0; right:0; text-align:center; z-index:7;
    color:#1e4d2b; padding:0 24px; text-shadow:0 2px 10px rgba(220,255,225,.8);
  }
  .title h1 { font-size:clamp(24px,6.8vw,35px); font-weight:800; }
  .title p  { font-size:15px; opacity:.85; font-weight:500; margin-top:2px; }

  /* ---------- panda ---------- */
  #petBox {
    position:absolute; bottom:10.5%; left:0; width:175px; z-index:10;
    transform:translateX(-190px);
    transition:transform 3s linear;
    will-change:transform;
  }
  #petInner { width:100%; transform-origin:50% 60%; }
  #pet { width:100%; display:block; overflow:visible; filter:drop-shadow(0 8px 8px rgba(20,60,30,.3)); }

  .breath { animation:breath 3.2s ease-in-out infinite; transform-origin:110px 150px; }
  @keyframes breath { 0%,100%{transform:scale(1,1);} 50%{transform:scale(1.02,.985);} }
  .eyesOpen { transform-box:fill-box; transform-origin:center; animation:blink 4.5s infinite; }
  @keyframes blink { 0%,93%,100%{transform:scaleY(1);} 96%{transform:scaleY(.08);} }
  .headG { transform-box:fill-box; transform-origin:center 80%; animation:headtilt 5s ease-in-out infinite; }
  @keyframes headtilt { 0%,100%{transform:rotate(0);} 50%{transform:rotate(3deg);} }
  #pet.munching .headG { animation:munch .3s ease-in-out infinite; }
  @keyframes munch { 0%,100%{transform:translateY(0) rotate(-1deg);} 50%{transform:translateY(3px) rotate(1deg);} }
  .bambooStick { transform-box:fill-box; transform-origin:bottom center; }
  #pet .bambooStick { opacity:0; transition:opacity .4s ease; }
  #pet.munching .bambooStick { opacity:1; animation:stickbob .3s ease-in-out infinite; }
  @keyframes stickbob { 0%,100%{transform:rotate(0);} 50%{transform:rotate(-4deg);} }
  #pet.blushing .blush { opacity:.65; }
  #pet.angry .brow { opacity:1; }
  .brow { opacity:0; transition:opacity .3s; }

  /* container states */
  .rollin   { animation:rollin 3s linear 1; }
  @keyframes rollin { from{transform:rotate(-720deg);} to{transform:rotate(0);} }
  .wobble   { animation:wobble 2.6s ease-in-out infinite; }
  @keyframes wobble { 0%,100%{transform:rotate(-2deg);} 50%{transform:rotate(2deg);} }
  .flopback { animation:flopback .9s ease-in 1 forwards; }
  @keyframes flopback {
    0%{transform:rotate(0);} 55%{transform:rotate(-78deg) translateY(4px);}
    70%{transform:rotate(-72deg);} 100%{transform:rotate(-76deg) translateY(6px);}
  }
  .popup    { animation:popup .5s cubic-bezier(.34,1.56,.64,1) 1; }
  @keyframes popup { 0%{transform:rotate(-76deg);} 100%{transform:rotate(0);} }
  .rage     { animation:rage .14s linear infinite; }
  @keyframes rage { 0%,100%{transform:translateX(-3px) rotate(-1.5deg);} 50%{transform:translateX(3px) rotate(1.5deg);} }
  .happyjump{ animation:hjump .55s ease-in-out infinite; }
  @keyframes hjump {
    0%,100%{transform:translateY(0) scale(1,1);} 30%{transform:translateY(0) scale(1.08,.9);}
    60%{transform:translateY(-30px) scale(.94,1.08) rotate(-4deg);}
  }

  /* ---------- bubble / hint / buttons / fall / finale ---------- */
  #bubble {
    position:absolute; z-index:20; left:50%; bottom:44%;
    transform:translateX(-50%) scale(0); transform-origin:50% 100%;
    max-width:78vw; background:#fffdf7; color:#1e4d2b;
    border-radius:20px; padding:13px 17px;
    font-size:17px; font-weight:700; line-height:1.35; text-align:center;
    box-shadow:0 10px 26px rgba(20,60,30,.35);
    transition:transform .4s cubic-bezier(.34,1.56,.64,1);
  }
  #bubble.show { transform:translateX(-50%) scale(1); }
  #bubble:after {
    content:''; position:absolute; bottom:-11px; left:50%; margin-left:-11px;
    border-left:11px solid transparent; border-right:11px solid transparent;
    border-top:13px solid #fffdf7;
  }
  #hint {
    position:absolute; bottom:4%; left:0; right:0; text-align:center; z-index:7;
    color:#1e4d2b; opacity:.7; font-size:13px; font-weight:600;
    animation:hintpulse 1.6s ease-in-out infinite;
  }
  @keyframes hintpulse { 0%,100%{opacity:.3;} 50%{opacity:.8;} }

  #btns {
    position:absolute; bottom:5%; left:0; right:0; z-index:30;
    display:none; flex-direction:column; gap:12px; align-items:center; padding:0 30px;
  }
  #btns.show { display:flex; }
  .btn {
    width:100%; max-width:320px; border:none; border-radius:50px;
    font-family:inherit; font-size:18px; font-weight:800; padding:15px 20px;
    cursor:pointer; box-shadow:0 8px 20px rgba(20,60,30,.4);
    transition:transform .12s ease;
  }
  .btn:active { transform:scale(.95); }
  #btnAte    { background:linear-gradient(135deg,#7ee08a,#3aa657); color:#0c3d1c; }
  #btnNotYet { background:rgba(255,255,255,.5); color:#1e4d2b; border:2px solid rgba(30,77,43,.4);
               font-size:15px; padding:12px 20px; max-width:260px;
               transition:transform .3s ease, opacity .3s ease; }

  .fall {
    position:absolute; top:-60px; z-index:8; font-size:28px;
    animation:falldown linear 1 forwards; pointer-events:none;
  }
  @keyframes falldown {
    0%{transform:translateY(0) rotate(0);opacity:1;} 90%{opacity:1;}
    100%{transform:translateY(110vh) rotate(340deg);opacity:0;}
  }

  #finale {
    position:absolute; inset:0; z-index:40; display:none;
    align-items:center; justify-content:center; padding:26px;
    background:rgba(20,60,30,.4); backdrop-filter:blur(3px);
  }
  #finale.show { display:flex; }
  .card {
    background:#fffdf7; border-radius:26px; padding:30px 24px; text-align:center;
    max-width:340px; width:100%; color:#1e4d2b;
    box-shadow:0 20px 50px rgba(10,40,20,.5);
    animation:cardpop .5s cubic-bezier(.34,1.56,.64,1) 1;
  }
  @keyframes cardpop { 0%{transform:scale(.6);opacity:0;} 100%{transform:scale(1);opacity:1;} }
  .card .big { font-size:52px; line-height:1; }
  .card h2 { font-size:23px; font-weight:800; margin:10px 0 6px; color:#2e8b47; }
  .card p  { font-size:16px; font-weight:600; line-height:1.45; }
  .card small { display:block; margin-top:14px; font-size:13px; opacity:.6; font-weight:600; }
  .replay { margin-top:18px; background:#7ee08a; border:none; border-radius:40px;
            font-family:inherit; font-weight:800; font-size:15px; padding:11px 26px;
            color:#0c3d1c; cursor:pointer; box-shadow:0 6px 14px rgba(12,61,28,.35); }
</style>
</head>
<body>

  <div id="sunmid"></div>
  <div class="bamboo" style="left:6%;  height:38%; animation-delay:-1s;"></div>
  <div class="bamboo" style="left:12%; height:28%; width:12px; animation-delay:-2.4s;"></div>
  <div class="bamboo" style="right:8%; height:34%; animation-delay:-3.2s;"></div>
  <div class="leaf" style="left:4%;  bottom:36%;">🌿</div>
  <div class="leaf" style="left:11%; bottom:27%; animation-delay:-2s;">🌿</div>
  <div class="leaf" style="right:6%; bottom:32%; animation-delay:-1s;">🌿</div>
  <div class="ground"></div>

  <div class="title">
    <h1 id="titleText">Priya, lunch check 🍱</h1>
    <p id="subText">official inspection by the food police</p>
  </div>

  <div id="petBox">
    <div id="petInner">
      <svg id="pet" viewBox="0 0 220 205" xmlns="http://www.w3.org/2000/svg">
        <g class="breath">
          <ellipse cx="110" cy="146" rx="60" ry="45" fill="#fff" stroke="#2f3b2f" stroke-width="5"/>
          <ellipse cx="62"  cy="150" rx="16" ry="26" fill="#2f3b2f" transform="rotate(18 62 150)"/>
          <ellipse cx="158" cy="150" rx="16" ry="26" fill="#2f3b2f" transform="rotate(-18 158 150)"/>
          <ellipse cx="80"  cy="184" rx="17" ry="11" fill="#2f3b2f"/>
          <ellipse cx="140" cy="184" rx="17" ry="11" fill="#2f3b2f"/>
          <ellipse cx="110" cy="152" rx="26" ry="18" fill="#f4f9f3" opacity=".9"/>
          <g class="bambooStick">
            <rect x="150" y="96" width="9" height="72" rx="4.5" fill="#5cae6e" stroke="#3c7f4c" stroke-width="3" transform="rotate(14 154 132)"/>
            <path d="M168 100 q16 -12 26 -4 q-14 8 -22 8 z" fill="#5cae6e" stroke="#3c7f4c" stroke-width="3" stroke-linejoin="round"/>
          </g>
          <g class="headG">
            <circle cx="76"  cy="26" r="17" fill="#2f3b2f"/>
            <circle cx="144" cy="26" r="17" fill="#2f3b2f"/>
            <circle cx="110" cy="66" r="50" fill="#fff" stroke="#2f3b2f" stroke-width="5"/>
            <ellipse cx="90"  cy="62" rx="15" ry="19" fill="#2f3b2f" transform="rotate(-14 90 62)"/>
            <ellipse cx="130" cy="62" rx="15" ry="19" fill="#2f3b2f" transform="rotate(14 130 62)"/>
            <g class="eyesOpen">
              <circle cx="91"  cy="63" r="6.5" fill="#fff"/>
              <circle cx="129" cy="63" r="6.5" fill="#fff"/>
              <circle cx="92"  cy="64" r="3.2" fill="#1a1a1a"/>
              <circle cx="128" cy="64" r="3.2" fill="#1a1a1a"/>
            </g>
            <path class="brow" d="M80 44 l18 8 M140 44 l-18 8" stroke="#2f3b2f" stroke-width="5" stroke-linecap="round"/>
            <ellipse cx="110" cy="84" rx="7" ry="5.5" fill="#2f3b2f"/>
            <path d="M110 90 q0 7 -7 8 M110 90 q0 7 7 8" stroke="#2f3b2f" stroke-width="3.5" fill="none" stroke-linecap="round"/>
            <circle class="blush" cx="72"  cy="82" r="8" fill="#f6a8a0" opacity="0"/>
            <circle class="blush" cx="148" cy="82" r="8" fill="#f6a8a0" opacity="0"/>
          </g>
        </g>
      </svg>
    </div>
  </div>

  <div id="bubble"></div>
  <div id="hint">tap anywhere to continue ▸</div>

  <div id="btns">
    <button class="btn" id="btnAte">Yes, I ate! 😌✅</button>
    <button class="btn" id="btnNotYet">not yet... 🙈</button>
  </div>

  <div id="finale">
    <div class="card">
      <div class="big">🍱💚</div>
      <h2>LUNCH PACT SEALED!</h2>
      <p id="finaleMsg">A fed Priya is a happy Priya, and a happy Priya is my whole personality 🐼<br>Same time tomorrow. The panda will be watching 👀💚</p>
      <small>— your lunch police panda 🎋</small>
      <button class="replay" id="replayBtn">Replay 🔁</button>
    </div>
  </div>

<script>
(function () {
  var petBox   = document.getElementById('petBox');
  var petInner = document.getElementById('petInner');
  var pet      = document.getElementById('pet');
  var bubble   = document.getElementById('bubble');
  var hint     = document.getElementById('hint');
  var btns     = document.getElementById('btns');
  var btnAte   = document.getElementById('btnAte');
  var btnNotYet= document.getElementById('btnNotYet');
  var finale   = document.getElementById('finale');
  var titleT   = document.getElementById('titleText');
  var subT     = document.getElementById('subText');

  var W = function(){ return window.innerWidth; };
  var petW = 175;

  function setAnim(cls) {
    petInner.className = '';
    void petInner.offsetWidth;
    if (cls) petInner.className = cls;
  }
  function movePet(xPercent, secs) {
    var x = (W()*xPercent/100) - petW/2;
    petBox.style.transitionDuration = secs + 's';
    petBox.style.transform = 'translateX(' + x + 'px)';
  }
  function say(t) {
    bubble.className = '';
    setTimeout(function(){ bubble.innerHTML = t; bubble.className = 'show'; }, 220);
  }
  function hideBubble(){ bubble.className = ''; }
  function drop(emoji, count, ms) {
    var n = 0;
    var t = setInterval(function(){
      var e = document.createElement('div');
      e.className = 'fall'; e.textContent = emoji;
      e.style.left = (5 + Math.random()*90) + '%';
      e.style.fontSize = (22 + Math.random()*16) + 'px';
      e.style.animationDuration = (2.2 + Math.random()*1.6) + 's';
      document.body.appendChild(e);
      setTimeout(function(){ if (e.parentNode) e.parentNode.removeChild(e); }, 4200);
      if (++n >= count) clearInterval(t);
    }, ms);
  }

  var steps = [
    function () { // panda ROLLS in
      setAnim('rollin');
      movePet(50, 3);
      setTimeout(function(){
        setAnim('wobble');
        say('*rolls in dramatically* 🐼<br>PRIYA. Emergency inspection 🚨');
      }, 3100);
    },
    function () {
      setAnim('');
      say('Question 1 of 1:<br><b>Did you eat lunch today?</b> 🍱<br>Be honest. Pandas can smell lies 👃');
    },
    function () { // munch demo
      pet.setAttribute('class','munching');
      say('Look, I\'m eating MY lunch 🎋<br>*munch munch munch*<br>This is called "setting an example" 😌');
    },
    function () { // dramatic flop
      pet.setAttribute('class','');
      setAnim('flopback');
      setTimeout(function(){
        say('Panda law says I cannot digest<br>until YOU eat 🐼⚖️<br>*lies down in protest*');
      }, 900);
    },
    function () {
      setAnim('popup');
      drop('🍜', 5, 220); drop('🥟', 5, 260); drop('🍛', 4, 320);
      say('LOOK at all this food that<br>could be in your tummy right now!!');
    },
    function () { // THE ASK
      setAnim('wobble');
      say('So, final answer...<br><b style="font-size:20px">lunch status? 🍱</b>');
      titleT.textContent = 'The interrogation 🐼';
      subT.textContent = 'lying to a panda is a crime';
      hint.style.display = 'none';
      btns.className = 'show';
    }
  ];

  var idx = 0, busy = false;
  function next() {
    if (idx >= steps.length) return;
    busy = true;
    steps[idx++]();
    setTimeout(function(){ busy = false; }, 700);
  }
  document.body.addEventListener('click', function () {
    if (btns.className === 'show' || finale.className === 'show') return;
    if (busy) return;
    next();
  });

  /* "not yet" escalation */
  var lvl = 0;
  var lines = [
    { t:'WHAT?! 😱 It\'s lunch o\'clock!!<br>GO. EAT. NOW. 👀', anim:'rage', angry:true, food:8 },
    { t:'Deploying emergency tiffin 🍱🍱🍱<br>This panda does not negotiate 😤', anim:'rage', angry:true, food:16 },
    { t:'That\'s it. I\'m telling your mom 📞<br>"Aunty, Priya skipped lunch again—" 😤', anim:'wobble', angry:false, food:10 }
  ];
  btnNotYet.addEventListener('click', function (e) {
    e.stopPropagation();
    if (lvl < lines.length) {
      var L = lines[lvl];
      pet.setAttribute('class', L.angry ? 'angry' : '');
      setAnim(L.anim);
      say(L.t);
      drop('🍱', L.food, 120);
      lvl++;
      if (lvl === lines.length) {
        btnNotYet.textContent = 'okay okay, going to eat 🏃‍♀️💨';
      }
    } else {
      win('Deal. Go eat, I\'ll wait right here 🐼<br>*watches supportively* 👀💚');
    }
  });

  function win(line) {
    btns.className = '';
    hideBubble();
    pet.setAttribute('class','blushing');
    setAnim('happyjump');
    drop('💚', 14, 120); drop('🍱', 10, 170); drop('🎋', 8, 240);
    say(line);
    titleT.textContent = 'Inspection passed ✅';
    subT.textContent = 'the panda is proud of you';
    setTimeout(function(){ finale.className = 'show'; }, 3200);
  }
  btnAte.addEventListener('click', function (e) {
    e.stopPropagation();
    win('GOOD HUMAN!! 😭💚<br>*proud panda noises* 🐼');
  });

  document.getElementById('replayBtn').addEventListener('click', function(){ location.reload(); });

  setTimeout(next, 900);
})();
</script>
</body>
</html>
