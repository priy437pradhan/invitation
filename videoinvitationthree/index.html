<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Video Invitation</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; font-family: 'Montserrat', sans-serif; background-color: #0b090a; display: flex; justify-content: center; align-items: center; perspective: 1000px; }
        
        .invitation-wrapper { position: relative; width: 100%; max-width: 450px; height: 100vh; max-height: 900px; box-shadow: 0 0 50px rgba(0,0,0,0.9); background: #000; }
        #bgVideo { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 1; }

        .cover-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: flex; justify-content: center; align-items: center; background: rgba(0, 0, 0, 0.4); cursor: pointer; transition: opacity 0.8s ease; }
        .click-hint-btn { background: rgba(255, 255, 255, 0.05); border: 2px solid #dfba6b; padding: 15px 30px; color: #dfba6b; font-family: 'Cinzel', serif; font-size: 13px; letter-spacing: 3px; text-transform: uppercase; border-radius: 4px; animation: pulseEffect 2s infinite; }

        @keyframes pulseEffect {
            0% { transform: scale(0.95); box-shadow: 0 0 10px rgba(223, 186, 107, 0.2); }
            50% { transform: scale(1.05); box-shadow: 0 0 25px rgba(223, 186, 107, 0.6); }
            100% { transform: scale(0.95); box-shadow: 0 0 10px rgba(223, 186, 107, 0.2); }
        }

        .content-layer { position: absolute; top: 12%; left: 8%; width: 84%; height: 76%; z-index: 5; display: flex; flex-direction: column; align-items: center; justify-content: space-between; text-align: center; opacity: 0; transform: translateZ(-200px) scale(0.7); transition: all 2s cubic-bezier(0.16, 1, 0.3, 1); pointer-events: none; padding: 20px 10px; }
        .content-layer.reveal { opacity: 1; transform: translateZ(0) scale(1); pointer-events: auto; }

        .wedding-quote { font-size: 12px; font-style: italic; color: #f8f1e5; line-height: 1.6; text-shadow: 0 2px 10px rgba(0,0,0,0.9); }
        .couple-names { font-family: 'Great Vibes', cursive; font-size: 48px; color: #f7d08a; margin: 5px 0; text-shadow: 0 3px 15px rgba(0,0,0,0.9); }
        .details-box h3 { font-family: 'Cinzel', serif; font-size: 16px; color: #ffffff; letter-spacing: 3px; margin-bottom: 5px; text-shadow: 0 2px 8px rgba(0,0,0,0.9); }
        .details-box p { font-size: 12px; color: #e3dcd2; line-height: 1.5; text-shadow: 0 2px 5px rgba(0,0,0,0.9); }

        .scratch-container { position: relative; width: 200px; height: 75px; box-shadow: 0 8px 25px rgba(0,0,0,0.6); border-radius: 4px; overflow: hidden; }
        .scratch-secret { position: absolute; width: 100%; height: 100%; background: rgba(15, 15, 15, 0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; border: 1px solid #dfba6b; border-radius: 4px; }
        .scratch-secret span { font-size: 8px; text-transform: uppercase; color: #bfa37c; letter-spacing: 1px; }
        .scratch-secret strong { font-family: 'Cinzel', serif; font-size: 13px; color: #ffffff; }
        #scratchCanvas { position: absolute; top: 0; left: 0; z-index: 2; cursor: pointer; touch-action: none; }
    </style>
</head>
<body>

    <div class="invitation-wrapper">
        
        <!-- Direct open-source video URL that will bypass security blockages for testing -->
        <video id="bgVideo" playsinline loop muted>
            <source src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" type="video/mp4">
        </video>

        <div class="cover-layer" id="coverLayer" onclick="startInvitationAnimation()">
            <div class="click-hint-btn">Open Invitation</div>
        </div>

        <div class="content-layer" id="contentLayer">
            <p class="wedding-quote">"Two hearts bound by love, <br>joining together for a lifetime of beautiful moments."</p>
            <div>
                <p style="font-size: 9px; letter-spacing: 4px; color: #dfd2be; text-transform: uppercase;">The Wedding Celebration of</p>
                <h1 class="couple-names">Veer & Zaara</h1>
            </div>
            <div class="details-box">
                <h3>DECEMBER 12, 2026</h3>
                <p style="font-size: 13px; margin-bottom: 2px;"><strong>The Royal Horizon Mansion</strong></p>
                <p>Beachside Gardens, Marine Drive, Mumbai</p>
            </div>
            <div>
                <p style="font-size: 9px; color: #ebdcc5; margin-bottom: 6px; letter-spacing: 1px;">✨ SCRATCH HERE TO SEE ACCESS CODE</p>
                <div class="scratch-container">
                    <div class="scratch-secret">
                        <span>Exclusive Guest Pass</span>
                        <strong>#VIP_VEERZAARA</strong>
                    </div>
                    <canvas id="scratchCanvas" width="200" height="75"></canvas>
                </div>
            </div>
        </div>

    </div>

    <script>
        const video = document.getElementById('bgVideo');
        const coverLayer = document.getElementById('coverLayer');
        const contentLayer = document.getElementById('contentLayer');

        function startInvitationAnimation() {
            coverLayer.style.opacity = '0';
            setTimeout(() => coverLayer.style.display = 'none', 800);
            
            video.muted = false; 
            video.play();

            setTimeout(() => {
                contentLayer.classList.add('reveal');
                initScratchCardInteraction();
            }, 1200);
        }

        function initScratchCardInteraction() {
            const canvas = document.getElementById('scratchCanvas');
            const ctx = canvas.getContext('2d');
            let isDrawing = false;

            ctx.fillStyle = '#ccaa62'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#ae8a3c';
            ctx.lineWidth = 2;
            ctx.strokeRect(3, 3, canvas.width - 6, canvas.height - 6);
            ctx.font = '600 9px Montserrat';
            ctx.fillStyle = '#ffffff';
            ctx.textAlign = 'center';
            ctx.fillText('✨ GENTLY SCRATCH ✨', canvas.width / 2, canvas.height / 2 + 3);

            function eraseMask(e) {
                if (!isDrawing) return;
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX || e.touches[0].clientX) - rect.left;
                const y = (e.clientY || e.touches[0].clientY) - rect.top;
                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath(); ctx.arc(x, y, 16, 0, Math.PI * 2); ctx.fill();
            }

            canvas.addEventListener('mousedown', () => isDrawing = true);
            canvas.addEventListener('mouseup', () => isDrawing = false);
            canvas.addEventListener('mousemove', eraseMask);
            canvas.addEventListener('touchstart', (e) => { isDrawing = true; eraseMask(e); });
            canvas.addEventListener('touchend', () => isDrawing = false);
            canvas.addEventListener('touchmove', eraseMask);
        }
    </script>
</body>
</html>
